<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>grab · live</title>
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-minimal.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-minimal.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0e0e0f;
    --surface: #181819;
    --border:  #2a2a2c;
    --text:    #e8e8e6;
    --muted:   #6b6b6e;
    --accent:  #c8f065;
    --danger:  #f06565;
    --mono:    'DM Mono', monospace;
    --sans:    'DM Sans', sans-serif;
    --radius:  12px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  /* ── Top bar ── */
  #top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    flex-shrink: 0;
  }
  #back-btn {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  #back-btn:hover { color: var(--text); }

  #channel-name {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    flex: 1;
  }

  #live-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--danger);
    color: #fff;
    flex-shrink: 0;
  }
  #live-badge.loading {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  #refresh-btn {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #refresh-btn:hover { color: var(--text); border-color: #444; }
  #refresh-btn:active { transform: scale(0.96); }

  /* ── Player wrap ── */
  #player-wrap {
    flex: 1;
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  video-player {
    display: block;
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 16/9;
    position: relative;
  }

  video-minimal-skin {
    --media-border-radius: 14px;
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Hide seek buttons and time/progress bar — not useful for live */
  media-seek-button,
  .media-time-controls,
  media-playback-rate-button { display: none !important; }

  /* Accent color for controls */
  video-minimal-skin {
    color: var(--accent);
  }

  /* ── Loading / error overlay ── */
  #overlay {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    z-index: 20;
  }
  #overlay.hidden { display: none; }

  .overlay-spinner {
    width: 30px; height: 30px;
    border: 2.5px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #overlay-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    max-width: 220px;
    line-height: 1.6;
  }

  #overlay-retry {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--accent);
    color: #0e0e0f;
    border: none;
    border-radius: var(--radius);
    padding: 9px 20px;
    cursor: pointer;
    display: none;
  }
  #overlay-retry.show { display: block; }
  #overlay-retry:active { transform: scale(0.97); }
</style>
</head>
<body>
<div id="app">

  <div id="top-bar">
    <button id="back-btn" onclick="window.location='/'">← back</button>
    <span id="channel-name">Sky Sports</span>
    <span id="live-badge" class="loading">LOADING</span>
    <button id="refresh-btn" onclick="reload()">↺ refresh</button>
  </div>

  <div id="player-wrap">
    <video-player style="position:relative">
      <video-minimal-skin>
        <video id="vid" slot="media" playsinline autoplay muted></video>
      </video-minimal-skin>
      <div id="overlay">
        <div class="overlay-spinner" id="spinner"></div>
        <div id="overlay-text">Loading stream…</div>
        <button id="overlay-retry" onclick="reload()">Retry</button>
      </div>
    </video-player>
  </div>

</div>

<script>
const STREAM   = "/api/live/stream";
const vid      = document.getElementById("vid");
const overlay  = document.getElementById("overlay");
const oText    = document.getElementById("overlay-text");
const oRetry   = document.getElementById("overlay-retry");
const spinner  = document.getElementById("spinner");
const badge    = document.getElementById("live-badge");

let hls        = null;
let retryTimer = null;
let retries    = 0;
const MAX      = 5;

function setOverlay(msg, showRetry = false, showSpinner = true) {
  overlay.classList.remove("hidden");
  oText.textContent          = msg;
  oRetry.className           = showRetry ? "show" : "";
  spinner.style.display      = showSpinner ? "block" : "none";
}

function hideOverlay() {
  overlay.classList.add("hidden");
  badge.textContent  = "LIVE";
  badge.className    = "";
}

function reload() {
  clearTimeout(retryTimer);
  retries = 0;
  start();
}

function start() {
  setOverlay("Loading stream…");
  badge.textContent = "LOADING";
  badge.className   = "loading";

  if (hls) { hls.destroy(); hls = null; }

  if (Hls.isSupported()) {
    hls = new Hls({
      liveSyncDurationCount:    3,
      liveMaxLatencyDurationCount: 6,
      maxBufferLength:          30,
    });
    hls.loadSource(STREAM);
    hls.attachMedia(vid);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      retries = 0;
      vid.play().catch(() => { vid.muted = true; vid.play(); });
    });

    hls.on(Hls.Events.FRAG_BUFFERED, () => hideOverlay());

    hls.on(Hls.Events.ERROR, (_, d) => {
      if (!d.fatal) return;
      if (retries < MAX) {
        retries++;
        const wait = retries * 3;
        setOverlay(`Reconnecting… (${retries}/${MAX})`);
        badge.textContent = "RETRYING";
        retryTimer = setTimeout(start, wait * 1000);
      } else {
        setOverlay("Stream unavailable.", true, false);
        badge.textContent = "OFFLINE";
        badge.className   = "loading";
      }
    });

  } else if (vid.canPlayType("application/vnd.apple.mpegurl")) {
    vid.src = STREAM;
    vid.addEventListener("loadedmetadata", () => { hideOverlay(); vid.play(); }, { once: true });
    vid.addEventListener("error", () => {
      if (retries < MAX) { retries++; retryTimer = setTimeout(start, retries * 3000); }
      else setOverlay("Stream unavailable.", true, false);
    }, { once: true });
  } else {
    setOverlay("HLS not supported in this browser.", true, false);
  }
}

// tap video to unmute
vid.addEventListener("click", () => { vid.muted = !vid.muted; });

start();
</script>
</body>
</html>
